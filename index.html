<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protagonist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22 font-family=%22Outfit, sans-serif%22 font-weight=%22900%22>p</text></svg>">
    <style>
        :root {
            --bg-page: #1a1a1a;
            /* Solid gray background */
            --text-main: #f3f4f6;
            --text-content: #d1d5db;
            --text-sub: #6b7280;
            --title-color: #e2e2e2;
            /* Light gray for dark mode */
            --accent: #ffffff;
            --border: #2d2d2d;
            --tag-border: #3f3f46;
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        [data-theme="light"] {
            --bg-page: #ffffff;
            --text-main: #0a0a0a;
            --text-content: #374151;
            --text-sub: #6b7280;
            --title-color: #000000;
            /* Black for light mode */
            --accent: #000000;
            --border: #e5e7eb;
            --tag-border: #d1d5db;
            --pattern-color: rgba(0, 0, 0, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;

            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Removed grain overlay */

        ::selection {
            background-color: var(--text-main);
            color: var(--bg-page);
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 10vh 24px;
            display: none;
            /* Hidden until passkey is entered */
        }

        #gatekeeper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-page);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
            text-align: center;
        }

        .gatekeeper-box {
            max-width: 400px;
            width: 100%;
        }

        .gatekeeper-box h2 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: var(--text-sub);
            text-transform: lowercase;
            letter-spacing: 0.1em;
        }

        .passkey-input {
            width: 100%;
            background: none;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 1.2rem;
            text-align: center;
            padding: 10px 0;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .passkey-input:focus {
            border-color: var(--accent);
        }

        .passkey-hint {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: var(--text-sub);
            text-transform: lowercase;
            opacity: 0.6;
            letter-spacing: 0.05em;
        }

        header {
            margin-bottom: 5rem;
        }

        header h1 {
            font-family: var(--font-display);
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 0.5rem;
            color: var(--title-color);
        }

        header p {
            font-size: 0.9rem;
            color: var(--text-sub);
            letter-spacing: 0.2em;
        }


        .contact-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 1.5rem;
        }

        .age-badge {
            font-size: 0.8rem;
            color: var(--text-sub);
            letter-spacing: 0.1em;
            opacity: 0.6;
            font-weight: 400;
        }

        .contact-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 0.8rem;
            color: var(--text-sub);
            text-decoration: none;
            text-transform: lowercase;
            letter-spacing: 0.1em;
            transition: color 0.2s ease;
        }

        .contact-link:hover {
            color: var(--accent);
        }

        .contact-link:hover {
            color: var(--accent);
        }

        .contact-link svg {
            width: 14px;
            height: 14px;
            opacity: 0.8;
        }

        .posts-container {
            display: flex;
            flex-direction: column;
            gap: 6rem;
        }

        .post {
            padding-left: 0;
            opacity: 0.3;
            /* Dim by default */
            transition: all 0.6s ease;
            transform: translateY(20px);
        }

        .post.is-visible {
            opacity: 1;
            transform: translateY(0);
        }





        .post-header {
            margin-bottom: 1.5rem;
        }

        .post-title {
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
            color: var(--text-main);
            text-transform: lowercase;
        }

        .post-meta {
            font-size: 0.8rem;
            color: var(--text-sub);
            display: flex;
            align-items: center;
            gap: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .post-tag {
            border: 1px solid var(--tag-border);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .post-content {
            font-size: 1.1rem;
            color: var(--text-content);
            white-space: pre-wrap;
            line-height: 1.8;
            overflow: hidden;
            position: relative;
        }

        .post-content.truncated {
            display: -webkit-box;
            -webkit-line-clamp: 4;
            line-clamp: 4;
            -webkit-box-orient: vertical;
        }

        .read-more-btn {
            background: none;
            border: none;
            color: var(--text-sub);
            font-family: var(--font-body);
            font-size: 0.8rem;
            text-transform: lowercase;
            padding: 8px 0;
            cursor: pointer;
            text-decoration: underline;
            margin-top: 10px;
        }

        .read-more-btn:hover {
            color: var(--accent);
        }

        .search-container {
            margin-bottom: 4rem;
        }

        .search-input {
            width: 100%;
            background: none;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 1rem;
            padding: 12px 0;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .search-input::placeholder {
            color: var(--text-sub);
            text-transform: lowercase;
            opacity: 0.5;
        }

        #loader {
            font-family: var(--font-display);
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            text-align: center;
            padding: 3rem 0;
            animation: pulse 1.5s infinite;
        }

        #error-message {
            color: #ef4444;
            padding: 1.5rem;
            border: 1px solid #7f1d1d;
            background: rgba(239, 68, 68, 0.1);
            text-align: center;
            display: none;
            border-radius: 4px;
        }

        .theme-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font-display);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.2s ease;
            z-index: 100;
        }

        .theme-toggle:hover {
            background: var(--text-main);
            color: var(--bg-page);
        }

        footer {
            margin-top: 10rem;
            padding-top: 4rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            font-size: 0.8rem;
            color: var(--text-sub);
            text-transform: lowercase;
            letter-spacing: 0.05em;
        }

        .footer-left h3,
        header h1 {
            cursor: pointer;
        }

        .footer-left h3 {
            font-family: var(--font-display);
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .footer-links {
            display: flex;
            gap: 2rem;
        }

        .footer-links a {
            color: var(--text-sub);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer-links a:hover {
            color: var(--accent);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 6vh 20px;
            }

            header {
                margin-bottom: 4rem;
            }

            header h1 {
                font-size: 3rem;
            }

            .post {
                padding-left: 1.5rem;
            }

            .post-title {
                font-size: 1.8rem;
            }

            .post-content {
                font-size: 1.05rem;
            }

            .posts-container {
                gap: 4rem;
            }

            footer {
                flex-direction: column;
                gap: 2rem;
                margin-top: 6rem;
            }
        }
    </style>
</head>

<div id="gatekeeper">
    <div class="gatekeeper-box">
        <h2>what is the rhythm?</h2>
        <input type="password" id="passkey-input" class="passkey-input" autocomplete="off" autofocus>
        <p class="passkey-hint">enter the passkey to continue</p>
    </div>
</div>



<div class="container" id="main-container">
    <button class="theme-toggle" id="theme-toggle">light</button>
    <header>
        <h1 onclick="window.location.reload()">protagonist</h1>
        <p>fragments of a rhythm</p>
        <div class="contact-wrapper">
            <span class="age-badge">26/M</span>
            <a href="mailto:hello@example.com" class="contact-link">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="20" height="16" x="2" y="4" rx="2" />
                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                </svg>
                <span>message</span>
            </a>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="search verses...">
    </div>

    <main>
        <div id="loader">Loading verses...</div>
        <div id="error-message"></div>
        <div id="posts" class="posts-container"></div>
    </main>

    <footer>
        <div class="footer-left">
            <h3 onclick="window.location.reload()">protagonist</h3>
            <p>&copy; 2026. fragments of a rhythm.</p>
        </div>
        <div class="footer-links">
            <a href="https://instagram.com" target="_blank">instagram</a>
            <a href="https://discord.com" target="_blank">discord</a>
        </div>
    </footer>
</div>

<script>
    // Gatekeeper Logic
    const gatekeeper = document.getElementById('gatekeeper');
    const mainContainer = document.getElementById('main-container');
    const passkeyInput = document.getElementById('passkey-input');

    // You can change the correct answer here
    const CORRECT_PASSKEY = "tarun";

    const unlock = () => {
        gatekeeper.style.display = 'none';
        mainContainer.style.display = 'block';
        localStorage.setItem('gatekeeper_unlocked', 'true');
    };

    // Auto-unlock if already authenticated in this session
    if (localStorage.getItem('gatekeeper_unlocked') === 'true') {
        unlock();
    }

    passkeyInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            if (passkeyInput.value.toLowerCase().trim() === CORRECT_PASSKEY) {
                unlock();
            } else {
                passkeyInput.value = '';
                passkeyInput.style.borderColor = '#ef4444';
                setTimeout(() => {
                    passkeyInput.style.borderColor = 'var(--border)';
                }, 500);
            }
        }
    });

    // Theme Management
    const themeToggle = document.getElementById('theme-toggle');
    const currentTheme = localStorage.getItem('theme') || 'dark';

    if (currentTheme === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
        themeToggle.textContent = 'dark';
    }

    themeToggle.addEventListener('click', () => {
        let theme = document.documentElement.getAttribute('data-theme');
        if (theme === 'light') {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('theme', 'dark');
            themeToggle.textContent = 'light';
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            localStorage.setItem('theme', 'light');
            themeToggle.textContent = 'dark';
        }
    });

    document.addEventListener('DOMContentLoaded', async () => {
        const postsContainer = document.getElementById('posts');
        const loader = document.getElementById('loader');
        const errorMessage = document.getElementById('error-message');
        const searchInput = document.getElementById('search-input');

        let allArticles = [];

        function renderArticles(articles) {
            postsContainer.innerHTML = '';

            if (articles.length === 0) {
                postsContainer.innerHTML = '<p style="text-align: center; color: var(--text-sub); font-style: italic; text-transform: lowercase;">no matches found.</p>';
                return;
            }

            articles.forEach(article => {
                const postElement = document.createElement('article');
                postElement.className = 'post';
                postElement.dataset.id = article.id;

                const dateObj = new Date(article.date);
                const day = dateObj.getDate();
                const month = dateObj.toLocaleDateString('en-US', { month: 'long' });
                const year = dateObj.getFullYear().toString().slice(-2);
                const formattedDate = `${day}, ${month} '${year}`;

                postElement.innerHTML = `
                        <header class="post-header">
                            <h2 class="post-title" id="title-${article.id}"></h2>
                            <div class="post-meta">
                                <time datetime="${article.date}">${formattedDate}</time>
                                <span class="post-tag">${article.type}</span>
                            </div>
                        </header>
                        <div class="post-content truncated" id="content-${article.id}"></div>
                        <button class="read-more-btn" id="btn-${article.id}">read more</button>
                    `;

                postsContainer.appendChild(postElement);

                // Scrollytelling Observer
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('is-visible');
                        } else {
                            // Optional: Remove to keep it visible once seen
                            // entry.target.classList.remove('is-visible');
                        }
                    });
                }, { threshold: 0.15 });

                observer.observe(postElement);

                const titleEl = document.getElementById(`title-${article.id}`);
                const contentEl = document.getElementById(`content-${article.id}`);
                const btnEl = document.getElementById(`btn-${article.id}`);

                titleEl.textContent = article.title;
                contentEl.textContent = article.content;

                const lineCount = article.content.split('\n').length;
                const needsTruncation = lineCount > 4;

                if (!needsTruncation) {
                    contentEl.classList.remove('truncated');
                    btnEl.style.display = 'none';
                } else {
                    postElement.style.cursor = 'pointer';
                }

                const togglePost = () => {
                    if (!needsTruncation) return;
                    const isTruncated = contentEl.classList.contains('truncated');
                    if (isTruncated) {
                        contentEl.classList.remove('truncated');
                        btnEl.textContent = 'show less';
                    } else {
                        contentEl.classList.add('truncated');
                        btnEl.textContent = 'read more';
                    }
                };

                postElement.addEventListener('click', togglePost);
                btnEl.addEventListener('click', (e) => {
                    e.stopPropagation();
                    togglePost();
                });
            });
        }



        try {
            const response = await fetch('content.json');

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();
            allArticles = data.articles || [];

            loader.style.display = 'none';
            renderArticles(allArticles);

            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                const filtered = allArticles.filter(article =>
                    article.title.toLowerCase().includes(query) ||
                    article.content.toLowerCase().includes(query) ||
                    article.type.toLowerCase().includes(query)
                );
                renderArticles(filtered);
            });

        } catch (error) {
            console.error("Error loading the content:", error);
            loader.style.display = 'none';
            errorMessage.style.display = 'block';
            errorMessage.textContent = 'oops! could not load the verses. check content.json.';
        }
    });
</script>
</body>

</html>
