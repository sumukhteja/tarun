<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protagonist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-page: #0a0a0a;
            --text-main: #f3f4f6;
            --text-sub: #6b7280;
            --accent: #ffffff;
            --border: #27272a;
            --tag-border: #3f3f46;
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        [data-theme="light"] {
            --bg-page: #ffffff;
            --text-main: #0a0a0a;
            --text-sub: #6b7280;
            --accent: #000000;
            --border: #e5e7eb;
            --tag-border: #d1d5db;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        ::selection {
            background-color: var(--text-main);
            color: var(--bg-page);
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 10vh 24px;
        }

        header {
            margin-bottom: 5rem;
        }

        header h1 {
            font-family: var(--font-display);
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 0.9rem;
            color: var(--text-sub);
            letter-spacing: 0.2em;
        }

        .posts-container {
            display: flex;
            flex-direction: column;
            gap: 6rem;
        }

        .post {
            border-left: 2px solid var(--border);
            padding-left: 2rem;
            transition: border-color 0.3s ease;
            animation: fadeIn 0.8s ease-out;
        }

        .post:hover {
            border-color: var(--accent);
        }

        .post-header {
            margin-bottom: 1.5rem;
        }

        .post-title {
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
            color: var(--text-main);
            text-transform: lowercase;
        }

        .post-meta {
            font-size: 0.8rem;
            color: var(--text-sub);
            display: flex;
            align-items: center;
            gap: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .post-tag {
            border: 1px solid var(--tag-border);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .post-content {
            font-size: 1.1rem;
            color: #d1d5db;
            white-space: pre-wrap;
            line-height: 1.8;
        }

        #loader {
            font-family: var(--font-display);
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            text-align: center;
            padding: 3rem 0;
            animation: pulse 1.5s infinite;
        }

        #error-message {
            color: #ef4444;
            padding: 1.5rem;
            border: 1px solid #7f1d1d;
            background: rgba(239, 68, 68, 0.1);
            text-align: center;
            display: none;
            border-radius: 4px;
        }

        .theme-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font-display);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.2s ease;
            z-index: 100;
        }

        .theme-toggle:hover {
            background: var(--text-main);
            color: var(--bg-page);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 6vh 20px;
            }

            header {
                margin-bottom: 4rem;
            }

            header h1 {
                font-size: 3rem;
            }

            .post {
                padding-left: 1.5rem;
            }

            .post-title {
                font-size: 1.8rem;
            }

            .post-content {
                font-size: 1.05rem;
            }

            .posts-container {
                gap: 4rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <button class="theme-toggle" id="theme-toggle">light</button>
        <header>
            <h1>protagonist</h1>
            <p>fragments of a rhythm</p>
        </header>

        <main>
            <div id="loader">Loading verses...</div>
            <div id="error-message"></div>
            <div id="posts" class="posts-container"></div>
        </main>
    </div>

    <script>
        // Theme Management
        const themeToggle = document.getElementById('theme-toggle');
        const currentTheme = localStorage.getItem('theme') || 'dark';

        if (currentTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            themeToggle.textContent = 'dark';
        }

        themeToggle.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'light') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'dark');
                themeToggle.textContent = 'light';
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
                themeToggle.textContent = 'dark';
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const postsContainer = document.getElementById('posts');
            const loader = document.getElementById('loader');
            const errorMessage = document.getElementById('error-message');

            try {
                // Fetch the content from content.json
                const response = await fetch('content.json');

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                const articles = data.articles;

                // Remove loader
                loader.style.display = 'none';

                if (!articles || articles.length === 0) {
                    postsContainer.innerHTML = '<p style="text-align: center; color: var(--accent-color); font-style: italic;">No verses found yet.</p>';
                    return;
                }

                // Render each post
                articles.forEach(article => {
                    const postElement = document.createElement('article');
                    postElement.className = 'post';

                    // Formatting date nicely
                    const dateObj = new Date(article.date);
                    const formattedDate = dateObj.toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });

                    // We use white-space: pre-wrap in CSS so textContent is perfectly safe to use
                    // and will automatically handle the \n correctly without using risky innerHTML.

                    postElement.innerHTML = `
                        <header class="post-header">
                            <h2 class="post-title" id="title-${article.id}"></h2>
                            <div class="post-meta">
                                <time datetime="${article.date}">${formattedDate}</time>
                                <span class="post-tag">${article.type}</span>
                            </div>
                        </header>
                        <div class="post-content" id="content-${article.id}"></div>
                    `;

                    postsContainer.appendChild(postElement);

                    // Safely set text content to prevent XSS and preserve proper formatting
                    document.getElementById(`title-${article.id}`).textContent = article.title;
                    document.getElementById(`content-${article.id}`).textContent = article.content;
                });

            } catch (error) {
                console.error("Error loading the content:", error);
                loader.style.display = 'none';
                errorMessage.style.display = 'block';
                errorMessage.textContent = 'Oops! Could not load the verses. Please make sure content.json is valid and the server is running.';
            }
        });
    </script>
</body>

</html>
