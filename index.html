<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protagonist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --bg-accent: #0f172a;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --neon-blue: #00f3ff;
            --neon-purple: #bd00ff;
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            /* Animated gradient mesh feel */
            background-image:
                radial-gradient(circle at 15% 50%, rgba(189, 0, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(0, 243, 255, 0.1) 0%, transparent 50%);
            background-attachment: fixed;
            background-size: cover;
            position: relative;
        }

        /* Scanline effect wrapper */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.3;
        }

        ::selection {
            background-color: var(--neon-purple);
            color: #fff;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 20px;
            position: relative;
            z-index: 1;
        }

        header {
            margin-bottom: 90px;
            text-align: center;
            position: relative;
        }

        header h1 {
            font-family: var(--font-display);
            font-size: 5.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 20px;
            background: linear-gradient(to right, var(--text-main), var(--text-sub));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
            position: relative;
            display: inline-block;
        }

        header h1::after {
            content: 'PROTAGONIST';
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
            filter: blur(15px);
            background: linear-gradient(to right, var(--neon-purple), var(--neon-blue));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.5;
        }

        header p {
            font-family: var(--font-body);
            font-size: 1.1rem;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-weight: 500;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
        }

        .posts-container {
            display: flex;
            flex-direction: column;
            gap: 60px;
        }

        .post {
            position: relative;
            padding: 50px 40px;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            animation: slideUp 0.8s ease-out backwards;
        }

        /* Stagger animation based on an attribute if possible, else just generic */
        .post:nth-child(1) {
            animation-delay: 0.1s;
        }

        .post:nth-child(2) {
            animation-delay: 0.2s;
        }

        .post:nth-child(3) {
            animation-delay: 0.3s;
        }

        .post::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(45deg, rgba(255, 255, 255, 0.1), transparent, rgba(189, 0, 255, 0.3));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .post:hover {
            transform: translateY(-8px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), 0 0 40px rgba(189, 0, 255, 0.15);
        }

        .post-header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 15px;
        }

        .post-title {
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.2;
            color: #fff;
            letter-spacing: -0.02em;
            margin-right: 20px;
            flex: 1;
        }

        .post-meta {
            font-size: 0.85rem;
            color: var(--text-sub);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .post-tag {
            background: linear-gradient(135deg, var(--neon-purple) 0%, #7a00ff 100%);
            color: #fff;
            padding: 4px 12px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            box-shadow: 0 4px 15px rgba(189, 0, 255, 0.4);
        }

        time {
            font-variant-numeric: tabular-nums;
            opacity: 0.7;
            letter-spacing: 0.05em;
        }

        .post-content {
            font-size: 1.15rem;
            color: #cbd5e1;
            white-space: pre-wrap;
            line-height: 1.8;
            font-weight: 400;
        }

        /* Subtle glowing dot behind content */
        .post-content::after {
            content: '';
            position: absolute;
            bottom: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: var(--neon-blue);
            filter: blur(80px);
            opacity: 0.1;
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
        }

        /* Loading & Error States */
        #loader {
            font-family: var(--font-display);
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-align: center;
            text-transform: uppercase;
            padding: 60px 0;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        #error-message {
            color: #ff3366;
            padding: 20px;
            display: none;
            background: rgba(255, 51, 102, 0.1);
            border: 1px solid rgba(255, 51, 102, 0.3);
            border-radius: 10px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            .container {
                padding: 50px 15px;
            }

            header {
                margin-bottom: 60px;
            }

            header h1 {
                font-size: 3rem;
            }

            .post {
                padding: 30px 20px;
                border-radius: 16px;
            }

            .post-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .post-meta {
                align-items: flex-start;
                flex-direction: row;
                width: 100%;
                justify-content: space-between;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                padding-top: 15px;
                margin-top: 5px;
            }

            .post-title {
                font-size: 1.8rem;
                margin-right: 0;
            }

            .post-content {
                font-size: 1.05rem;
            }

            .posts-container {
                gap: 40px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>Protagonist</h1>
            <p>Poetry and Rap Journal</p>
        </header>

        <main>
            <div id="loader">Loading verses...</div>
            <div id="error-message"></div>
            <div id="posts" class="posts-container"></div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const postsContainer = document.getElementById('posts');
            const loader = document.getElementById('loader');
            const errorMessage = document.getElementById('error-message');

            try {
                // Fetch the content from content.json
                const response = await fetch('content.json');

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                const articles = data.articles;

                // Remove loader
                loader.style.display = 'none';

                if (!articles || articles.length === 0) {
                    postsContainer.innerHTML = '<p style="text-align: center; color: var(--accent-color); font-style: italic;">No verses found yet.</p>';
                    return;
                }

                // Render each post
                articles.forEach(article => {
                    const postElement = document.createElement('article');
                    postElement.className = 'post';

                    // Formatting date nicely
                    const dateObj = new Date(article.date);
                    const formattedDate = dateObj.toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });

                    // We use white-space: pre-wrap in CSS so textContent is perfectly safe to use
                    // and will automatically handle the \n correctly without using risky innerHTML.

                    postElement.innerHTML = `
                        <header class="post-header">
                            <h2 class="post-title" id="title-${article.id}"></h2>
                            <div class="post-meta">
                                <time datetime="${article.date}">${formattedDate}</time>
                                <span class="post-tag">${article.type}</span>
                            </div>
                        </header>
                        <div class="post-content" id="content-${article.id}"></div>
                    `;

                    postsContainer.appendChild(postElement);

                    // Safely set text content to prevent XSS and preserve proper formatting
                    document.getElementById(`title-${article.id}`).textContent = article.title;
                    document.getElementById(`content-${article.id}`).textContent = article.content;
                });

            } catch (error) {
                console.error("Error loading the content:", error);
                loader.style.display = 'none';
                errorMessage.style.display = 'block';
                errorMessage.textContent = 'Oops! Could not load the verses. Please make sure content.json is valid and the server is running.';
            }
        });
    </script>
</body>

</html>
