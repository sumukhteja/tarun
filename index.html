<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verses & Bars</title>
    <style>
        :root {
            --bg-color: #faf9f6; /* Soft off-white */
            --text-color: #1c1c1c; /* Deep off-black */
            --accent-color: #5a5a5a;
            --font-serif: 'Georgia', 'Garamond', serif;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --spacing-unit: 1.5rem;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-sans);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            margin-bottom: 60px;
            text-align: center;
        }

        header h1 {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            font-weight: normal;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 0.95rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .posts-container {
            display: flex;
            flex-direction: column;
            gap: 80px;
        }

        .post {
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding-bottom: 60px;
            animation: fadeIn 0.8s ease-out;
        }

        .post:last-child {
            border-bottom: none;
        }

        .post-header {
            margin-bottom: var(--spacing-unit);
        }

        .post-title {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            font-weight: normal;
            margin-bottom: 5px;
            line-height: 1.3;
        }

        .post-meta {
            font-size: 0.85rem;
            color: var(--accent-color);
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .post-tag {
            background-color: rgba(0, 0, 0, 0.04);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* 
           Crucial for poetry and rap: 
           preserves line breaks (\n) and spaces from the JSON 
        */
        .post-content {
            font-family: var(--font-serif);
            font-size: 1.15rem;
            white-space: pre-wrap; 
            line-height: 1.9;
        }

        /* Loading & Error States */
        #loader {
            text-align: center;
            color: var(--accent-color);
            font-style: italic;
            font-family: var(--font-serif);
            padding: 40px 0;
        }

        #error-message {
            text-align: center;
            color: #d32f2f;
            padding: 20px;
            display: none;
            background: #ffebee;
            border-radius: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            .container {
                padding: 30px 15px;
            }
            
            header {
                margin-bottom: 40px;
            }

            header h1 {
                font-size: 2rem;
            }

            .post-title {
                font-size: 1.5rem;
            }

            .post-content {
                font-size: 1.05rem;
            }
            
            .posts-container {
                gap: 60px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Thoughts & Rhymes</h1>
            <p>Poetry and Rap Journal</p>
        </header>

        <main>
            <div id="loader">Loading verses...</div>
            <div id="error-message"></div>
            <div id="posts" class="posts-container"></div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const postsContainer = document.getElementById('posts');
            const loader = document.getElementById('loader');
            const errorMessage = document.getElementById('error-message');

            try {
                // Fetch the content from content.json
                const response = await fetch('content.json');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                const articles = data.articles;

                // Remove loader
                loader.style.display = 'none';

                if (!articles || articles.length === 0) {
                    postsContainer.innerHTML = '<p style="text-align: center; color: var(--accent-color); font-style: italic;">No verses found yet.</p>';
                    return;
                }

                // Render each post
                articles.forEach(article => {
                    const postElement = document.createElement('article');
                    postElement.className = 'post';

                    // Formatting date nicely
                    const dateObj = new Date(article.date);
                    const formattedDate = dateObj.toLocaleDateString('en-US', { 
                        year: 'numeric', 
                        month: 'long', 
                        day: 'numeric' 
                    });

                    // We use white-space: pre-wrap in CSS so textContent is perfectly safe to use
                    // and will automatically handle the \n correctly without using risky innerHTML.
                    
                    postElement.innerHTML = `
                        <header class="post-header">
                            <h2 class="post-title" id="title-${article.id}"></h2>
                            <div class="post-meta">
                                <time datetime="${article.date}">${formattedDate}</time>
                                <span class="post-tag">${article.type}</span>
                            </div>
                        </header>
                        <div class="post-content" id="content-${article.id}"></div>
                    `;

                    postsContainer.appendChild(postElement);

                    // Safely set text content to prevent XSS and preserve proper formatting
                    document.getElementById(`title-${article.id}`).textContent = article.title;
                    document.getElementById(`content-${article.id}`).textContent = article.content;
                });

            } catch (error) {
                console.error("Error loading the content:", error);
                loader.style.display = 'none';
                errorMessage.style.display = 'block';
                errorMessage.textContent = 'Oops! Could not load the verses. Please make sure content.json is valid and the server is running.';
            }
        });
    </script>
</body>
</html>
